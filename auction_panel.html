<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Live Bidding Panel</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
:root{
  --dark-bg: #00111a;
  --tile-bg: #001621;
  --neon: #00eaff;
  --neon2:#9ffcff;
}
body{
  margin:0;
  font-family:Arial,Helvetica,sans-serif;
  background:radial-gradient(circle,#06273a,#00101a 70%);
  color:white;
  -webkit-font-smoothing:antialiased;
  padding-bottom:40px;
}

/* Top controls */
.top-panel{
  display:flex;
  gap:12px;
  flex-wrap:wrap;
  justify-content:center;
  padding:18px;
  align-items:center;
}
.control-box{
  padding:10px 12px;
  border-radius:10px;
  background:rgba(0,20,35,0.6);
  border:1px solid rgba(0,240,255,0.12);
}
.control-box label{ color:var(--neon2); font-size:13px; display:block; margin-bottom:6px; }
.control-box input{ width:120px; padding:6px; border-radius:6px; border:1px solid rgba(0,240,255,0.12); background:#00121c; color:var(--neon); }

/* Buttons */
.button{
  padding:10px 14px;
  border-radius:8px;
  border:0;
  background:var(--neon);
  color:#00131b;
  font-weight:700;
  cursor:pointer;
  box-shadow:0 6px 18px rgba(0,240,255,0.06);
}

/* Display */
.display{
  width:92%;
  max-width:360px;
  margin:18px auto;
  border-radius:14px;
  overflow:hidden;
  display:flex;
  align-items:center;
  background:var(--dark-bg);
  box-shadow:0 6px 26px rgba(0,0,0,0.6);
  transition: background 200ms ease, box-shadow 200ms ease;
}
.display .color-strip{
  width:12%;
  min-width:64px;
  height:100%;
}
.display .content{
  padding:18px 22px;
  flex:1;
}
.title-small{
  font-size:14px;
  color:var(--neon2);
  margin-bottom:6px;
}
.big-bid{
  font-size:56px;
  font-weight:800;
  color:#ffffff;
}
.team-label{
  font-size:20px;
  color:#ffffff;
  margin-top:6px;
}

#noticeBox{
  width:92%;
  max-width:360px;
  margin:10px auto;
  padding:12px;
  border-radius:10px;

  background:#220909;
  color:#ffb3b3;

  font-weight:700;
  text-align:center;

  height:48px;
  box-sizing:border-box;

  display:flex;
  align-items:center;
  justify-content:center;
}

/* Team grid */
.team-grid{
  display:grid;
  grid-template-columns:repeat(5,1fr);
  gap:12px;
  width:92%;
  max-width:1100px;
  margin:20px auto;
}

.team-cell{
  display:flex;
  border-radius:12px;
  overflow:hidden;
  align-items:stretch;
  background: var(--teamColor, var(--tile-bg));
  border:1px solid rgba(255,255,255,0.03);
  box-shadow:0 6px 18px rgba(0,0,0,0.45);
}

.team-cell .strip{
  width:12%;
  min-width:46px;
}

.team-cell .body{
  padding:12px;
  flex:1;
  display:flex;
  flex-direction:column;
  justify-content:center;
  color:white;
}

.team-cell input{
  border:0;
  background:transparent;
  color:white;
  font-size:18px;
  font-weight:700;
  outline:none;
  width:100%;
}

.team-max{
  margin-top:8px;
  color:rgba(255,255,255,0.9);
  font-size:13px;
  font-weight:700;
}

.rules {
  width:92%;
  max-width:900px;
  margin:16px auto;
  background:#01121a;
  padding:12px;
  border-radius:10px;
}

.rules .row{
  display:flex;
  gap:8px;
  margin-bottom:8px;
  align-items:center;
}

.rules input{
  padding:8px;
  border-radius:6px;
  border:1px solid rgba(0,240,255,0.08);
  background:#00121c;
  color:var(--neon);
  width:100%;
}

.controls-row{
  width:92%;
  max-width:900px;
  margin:16px auto 36px;
  display:flex;
  gap:12px;
  justify-content:center;
  align-items:center;
}

.small{
  font-size:12px;
  color:#9ffcff;
  text-align:center;
}

@media (max-width:820px){
  .team-grid{
    grid-template-columns:repeat(2,1fr);
  }

  .big-bid{
    font-size:44px;
  }

  .display .color-strip{
    min-width:48px;
  }
}
</style>
</head>

<body>

<div class="top-panel">

  <div class="control-box">
    <label>Starting Bid</label>
    <input id="startBid" type="number" value="100">
  </div>

  <div class="control-box">
    <label>Fallback Inc</label>
    <input id="fallbackInc" type="number" value="10">
  </div>

  <button class="button" onclick="undoBid()">Undo</button>
  <button class="button" onclick="playerSold()">Player Sold</button>
  <button class="button" onclick="resetBid()">Reset</button>
  <button class="button" onclick="startAuction()" id="startAuctionBtn">
    Start Auction
  </button>

</div>

<div class="display" id="mainDisplay">

  <div class="color-strip" id="currentStrip" style="background:#1565C0"></div>

  <div class="content">
    <div class="title-small">CURRENT BID</div>
    <div class="big-bid" id="currentBid">100</div>
    <div class="team-label" id="currentTeam">---</div>
  </div>

</div>

<div id="noticeBox"></div>

<div class="footer-note" style="text-align:center; color:#9ffcff; margin-top:8px;">
  Edit team names and increment rules below — changes sync to owners & owners' mobiles.
</div>

<div class="team-grid" id="teamGrid"></div>

<div class="rules" id="rulesBox">

  <div style="display:flex;gap:8px;margin-bottom:8px;">
    <div style="width:60px;color:var(--neon2);font-weight:700">Rule</div>
    <div style="flex:1;color:var(--neon2);font-weight:700">From</div>
    <div style="flex:1;color:var(--neon2);font-weight:700">To</div>
    <div style="width:140px;color:var(--neon2);font-weight:700">Increment</div>
  </div>

  <div class="row">
    <div style="width:60px;color:var(--neon2)">1</div>
    <input id="r1_from"/>
    <input id="r1_to"/>
    <input id="r1_inc"/>
  </div>

  <div class="row">
    <div style="width:60px;color:var(--neon2)">2</div>
    <input id="r2_from"/>
    <input id="r2_to"/>
    <input id="r2_inc"/>
  </div>

  <div class="row">
    <div style="width:60px;color:var(--neon2)">3</div>
    <input id="r3_from"/>
    <input id="r3_to"/>
    <input id="r3_inc"/>
  </div>

  <div class="row">
    <div style="width:60px;color:var(--neon2)">4</div>
    <input id="r4_from"/>
    <input id="r4_to"/>
    <input id="r4_inc"/>
  </div>

  <div class="row">
    <div style="width:60px;color:var(--neon2)">5</div>
    <input id="r5_from"/>
    <input id="r5_to"/>
    <input id="r5_inc"/>
  </div>

  <div style="text-align:right; margin-top:6px;">
    <button class="button" onclick="saveRules()">Save Rules</button>
  </div>

</div>

<div class="controls-row">
  <div class="small">
    First bid equals starting bid (no increment).
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>

const firebaseConfig = {
  apiKey: "AIzaSyCX6FYo5gVgCmds7Xf63xF-Xcg6eIutQmk",
  authDomain: "auction-71c28.firebaseapp.com",
  databaseURL: "https://auction-71c28-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "auction-71c28",
  storageBucket: "auction-71c28.firebasestorage.app",
  messagingSenderId: "92883040612",
  appId: "1:92883040612:web:473f540c99efc20e8d2271"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

const BID_COOLDOWN = 1500;

const ownerKeys = {
  "t1_Km8Qx2Lp9A":1,
  "t2_Vn4Rb7Ty3M":2,
  "t3_Zp6Hd1Wx8K":3,
  "t4_Qr9Lm5Nc2J":4,
  "t5_Yu3Bx8Pa6T":5,
  "t6_Fk1Vz7Dw4R":6,
  "t7_Hm5Qp2Ls9X":7,
  "t8_Jt8Nc4Vy1B":8,
  "t9_Mx2Rw6Qa7P":9,
  "t10_Pv7Lk3Dz5N":10
};

const defaultTeams = {
1:"Team 1",
2:"Team 2",
3:"Team 3",
4:"Team 4",
5:"Team 5",
6:"Team 6",
7:"Team 7",
8:"Team 8",
9:"Team 9",
10:"Team 10"
};

const TEAM_COLORS = {
  1:{ base:"#1565C0", glow:"rgba(21,101,192,0.25)" },
  2:{ base:"#C62828", glow:"rgba(198,40,40,0.25)" },
  3:{ base:"#2E7D32", glow:"rgba(46,125,50,0.25)" },
  4:{ base:"#6A1B9A", glow:"rgba(106,27,154,0.25)" },
  5:{ base:"#EF6C00", glow:"rgba(239,108,0,0.25)" },
  6:{ base:"#00838F", glow:"rgba(0,131,143,0.25)" },
  7:{ base:"#AD1457", glow:"rgba(173,20,87,0.25)" },
  8:{ base:"#5D4037", glow:"rgba(93,64,55,0.25)" },
  9:{ base:"#283593", glow:"rgba(40,53,147,0.25)" },
  10:{ base:"#9E9D24", glow:"rgba(158,157,36,0.25)" }
};

db.ref('teams').once('value').then(snap=>{
  if(!snap.exists()) db.ref('teams').set(defaultTeams);
});

db.ref('ownerKeys').once('value').then(snap=>{
  if(!snap.exists()) db.ref('ownerKeys').set(ownerKeys);
});

const teamGrid = document.getElementById('teamGrid');

for(let i=1;i<=10;i++){

  const tile = document.createElement('div');

  tile.className = 'team-cell';

  const col = TEAM_COLORS[i].base;

  tile.style.background = col;
  tile.style.boxShadow = `0 0 16px ${TEAM_COLORS[i].glow}`;

  tile.innerHTML = `
    <div class="strip" style="background:${col}"></div>

    <div class="body">
      <input id="t${i}" data-team="${i}" placeholder="Team ${i}">
      <div id="t${i}_max" class="team-max">Max: —</div>
    </div>
  `;

  teamGrid.appendChild(tile);
}

db.ref('teams').on('value', snap=>{

  const teams = snap.val() || defaultTeams;

  for(let i=1;i<=10;i++){

    const el = document.getElementById('t'+i);

    if(el) el.value = teams[i] || ('Team '+i);

  }

});

let tTimer = null;

teamGrid.addEventListener('input', e=>{

  if(!e.target.matches('input')) return;

  clearTimeout(tTimer);

  tTimer = setTimeout(()=>{

    const obj = {};

    for(let i=1;i<=10;i++){

      obj[i] =
      document.getElementById('t'+i).value || ('Team '+i);

    }

    db.ref('teams').set(obj);

  },400);

});

let increments = [];

db.ref('increments').once('value').then(snap=>{

  if(!snap.exists()){

    const defaults = [

      {from:1,to:20,inc:1},
      {from:20,to:40,inc:2},
      {from:40,to:100,inc:3},
      {from:100,to:500,inc:5},
      {from:500,to:99999,inc:10}

    ];

    db.ref('increments').set(defaults);

  }

});

db.ref('increments').on('value', snap=>{

  increments = snap.val() || [];

  for(let i=0;i<5;i++){

    const r = increments[i] || {};

    document.getElementById(`r${i+1}_from`).value =
    r.from ?? "";

    document.getElementById(`r${i+1}_to`).value =
    r.to ?? "";

    document.getElementById(`r${i+1}_inc`).value =
    r.inc ?? "";

  }

});
let maxBids = {};

db.ref('maxBids').on('value', snap=>{

  maxBids = snap.val() || {};

  for(let i=1;i<=10;i++){

    const el = document.getElementById(`t${i}_max`);

    if(el){

      const v = maxBids[String(i)];

      el.innerText =
      'Max: ' + ((v===undefined || v===null || v===0) ? '—' : v);

    }

  }

});

/* REPLACE SHEET LINK LATER */
const SHEET_ID =
"1uww5Uq0-kya9gM4pTWFgp79n4lVgeH0Nr6C_v7FOjQ4";

const GVIZ_URL =
`https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&range=B27:K27`;

function fetchSheetOnce(){

  fetch(GVIZ_URL)
  .then(r=>r.text())
  .then(txt=>{

    const jsonText =
    txt.replace(/^[^\(]*\(/,'').replace(/\);?$/,'');

    const obj = JSON.parse(jsonText);

    const rows =
    obj.table.rows[0].c;

    const newMax = {};

    for(let i=0;i<10;i++){

      const cell = rows[i];

      let val = 0;

      if(cell && cell.v !== null){

        val = Number(cell.v);

      }

      newMax[String(i+1)] = val;

    }

    maxBids = newMax;

    db.ref('maxBids').set(maxBids);

  });

}

fetchSheetOnce();

setInterval(fetchSheetOnce,10000);

function showNotice(msg){

  const box =
  document.getElementById("noticeBox");

  box.innerText = msg;

  clearTimeout(window.noticeTimer);

  window.noticeTimer = setTimeout(()=>{

    box.innerText = "";

  },2000);

}

function getIncrementFor(bidValue){

  if(!increments || increments.length===0){

    return Number(document.getElementById('fallbackInc').value) || 10;

  }

  for(let i=0;i<increments.length;i++){

    const r = increments[i];

    if(bidValue >= r.from && bidValue <= r.to){

      return Number(r.inc);

    }

  }

  return Number(document.getElementById('fallbackInc').value) || 10;

}

function updateOwners(){

  db.ref('liveDisplay').set({
    currentBid: currentBid,
    currentTeam:
    document.getElementById('currentTeam').innerText,
    ts: Date.now()
  });

}

function pushToLast10(teamNum, amount, teamName){

  db.ref('last10bids').once('value').then(snap=>{

    let arr = snap.val() || [];

    arr.unshift({
      teamNum,
      amount,
      team:teamName
    });

    arr = arr.slice(0,10);

    db.ref('last10bids').set(arr);

  });

}

function removeTopLast10(){

  db.ref('last10bids').once('value').then(snap=>{

    let arr = snap.val() || [];

    arr.shift();

    db.ref('last10bids').set(arr);

  });

}

let currentBid =
parseInt(document.getElementById('startBid').value,10) || 100;

let history = [];

let lastBidTeam = null;

let saleLocked = false;

let cooldownActive = false;

let auctionRunning = false;

db.ref('auctionState').on('value', snap=>{

  auctionRunning = (snap.val() === "running");

});

function startAuction(){

  saleLocked = false;

  db.ref('auctionState').set("running");

  auctionRunning = true;

}

function updateDisplay(team){

  document.getElementById('currentBid').innerText =
  currentBid;

  document.getElementById('currentTeam').innerText =
  team;

}

function setCurrentStrip(teamNum){

  const col =
  TEAM_COLORS[teamNum].base;

  document.getElementById('currentStrip').style.background =
  col;

  document.getElementById('mainDisplay').style.background =
  col;

}

function computeNextBidAmountIf(teamNum){

  const isFirstAccepted =
  (history.length === 0);

  if(isFirstAccepted) return currentBid;

  const inc = getIncrementFor(currentBid);

  return Number(currentBid) + Number(inc);

}

function placeBid(teamNum){

  if(saleLocked) return;

  if(cooldownActive){

    showNotice("Cooldown Active");

    return;

  }

  if(!auctionRunning){

    showNotice("Auction Not Started");

    return;

  }

  if(lastBidTeam === teamNum) return;

  const teamMax =
  Number(maxBids[String(teamNum)] || 0);

  const nextValue =
  computeNextBidAmountIf(teamNum);

  if(teamMax > 0 && nextValue > teamMax){

    const rejectedTeamName =
    document.getElementById("t"+teamNum).value;

    showNotice(
      `Bid rejected for ${rejectedTeamName} — max ${teamMax}`
    );

    return;

  }

  const isFirstAccepted =
  (history.length === 0);

  const teamName =
  document.getElementById('t'+teamNum).value;

  if(isFirstAccepted){

    lastBidTeam = teamNum;

    history.push({
      bid: currentBid,
      team:
      document.getElementById('currentTeam').innerText
    });

    updateDisplay(teamName);

    setCurrentStrip(teamNum);

    pushToLast10(teamNum,currentBid,teamName);

    updateOwners();

    cooldownActive = true;

    setTimeout(()=>{
      cooldownActive = false;
    }, BID_COOLDOWN);

    return;

  }

  const inc =
  getIncrementFor(currentBid);

  lastBidTeam = teamNum;

  history.push({
    bid: currentBid,
    team:
    document.getElementById('currentTeam').innerText
  });

  currentBid =
  Number(currentBid) + Number(inc);

  updateDisplay(teamName);

  setCurrentStrip(teamNum);

  pushToLast10(teamNum,currentBid,teamName);

  updateOwners();

  cooldownActive = true;

  setTimeout(()=>{
    cooldownActive = false;
  }, BID_COOLDOWN);

}

function undoBid(){

  saleLocked = false;

  db.ref('auctionState').set("running");

  auctionRunning = true;

  if(history.length === 0) return;

  const last = history.pop();

  currentBid = last.bid;

  lastBidTeam = null;

  updateDisplay(last.team);

  setCurrentStrip(1);

  updateOwners();

  removeTopLast10();

}

function resetBid(){

  db.ref('auctionState').set("stopped");

  auctionRunning = false;

  saleLocked = false;

  currentBid =
  parseInt(document.getElementById('startBid').value,10) || 100;

  history = [];

  lastBidTeam = null;

  updateDisplay('---');

  setCurrentStrip(1);

  updateOwners();

  db.ref('last10bids').set([]);

}

function playerSold(){

  if (!history.length) return;

  saleLocked = true;

  db.ref('auctionState').set("stopped");

  auctionRunning = false;

  const teamName =
  document.getElementById('currentTeam').innerText;

  const bid =
  Number(document.getElementById('currentBid').innerText);

  document.getElementById('currentTeam').innerText =
  `SOLD TO: ${teamName}`;

  document.getElementById('currentBid').innerText =
  bid;

  db.ref('liveDisplay').set({
    currentBid: bid,
    currentTeam:"SOLD",
    soldTo: teamName,
    ts: Date.now()
  });

  pushToLast10(lastBidTeam,bid,`SOLD TO: ${teamName}`);

}

document.addEventListener('keydown', e=>{

  if(e.key >= '1' && e.key <= '9'){

    placeBid(parseInt(e.key,10));

  }

  if(e.key === '0'){

    placeBid(10);

  }

});

let lastSeenTime = 0;

db.ref('latestBid').on('value', snap=>{

  const data = snap.val();

  if(!data) return;

  if(!data.time || data.time <= lastSeenTime) return;

  lastSeenTime = data.time;

  const tnum = Number(data.teamNum);

  if(!tnum || tnum < 1 || tnum > 10) return;

  placeBid(tnum);

});

window.addEventListener('load', ()=>{

  updateDisplay('---');

  setCurrentStrip(1);

  updateOwners();

});

</script>

</body>
</html>
