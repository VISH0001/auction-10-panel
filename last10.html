<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Last 10 Bids</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>

body{
  background:#00101a;
  color:#dffbff;
  font-family:"Lexend",sans-serif;
  padding:20px;
}

/* TITLE */

h2{
  text-align:center;

  color:#00eaff;

  font-size:34px;

  text-shadow:
  0 0 10px #00eaff,
  0 0 22px #00eaff;

  margin-bottom:28px;
}

/* CONTAINER */

#lineContainer{
  max-width:360px;
  margin:0 auto;
}

/* EACH BID ROW */

.bidRow{

  display:flex;

  justify-content:space-between;

  align-items:center;

  padding:18px 22px;

  margin:14px 0;

  border-radius:18px;

  color:white;

  font-size:22px;

  font-weight:600;

  transition:0.22s;

  animation:rowGlow 1.4s infinite alternate;
}

.bidRow:hover{
  transform:scale(1.02);
}

/* GLOW PULSE */

@keyframes rowGlow{

  0%{
    filter:brightness(0.92);
  }

  100%{
    filter:brightness(1.12);
  }

}

/* AMOUNT */

.amount{
  font-weight:700;
  font-size:24px;
}

/* TEAM COLORS */

.team1{
  background:#1565C0;
}

.team2{
  background:#C62828;
}

.team3{
  background:#2E7D32;
}

.team4{
  background:#6A1B9A;
}

.team5{
  background:#EF6C00;
}

.team6{
  background:#00838F;
}

.team7{
  background:#AD1457;
}

.team8{
  background:#5D4037;
}

.team9{
  background:#283593;
}

.team10{
  background:#9E9D24;
}

</style>
</head>

<body>

<h2>Last 10 Bids</h2>

<div id="lineContainer"></div>

<!-- FIREBASE -->

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>

/* FIREBASE */

const firebaseConfig = {

  apiKey:
  "AIzaSyCX6FYo5gVgCmds7Xf63xF-Xcg6eIutQmk",

  authDomain:
  "auction-71c28.firebaseapp.com",

  databaseURL:
  "https://auction-71c28-default-rtdb.asia-southeast1.firebasedatabase.app",

  projectId:
  "auction-71c28",

  storageBucket:
  "auction-71c28.firebasestorage.app",

  messagingSenderId:
  "92883040612",

  appId:
  "1:92883040612:web:473f540c99efc20e8d2271"

};

firebase.initializeApp(firebaseConfig);

const db =
firebase.database();

/* TEAM COLORS */

const teamColors = {

  1:{
    bg:"#1565C0",
    glow:"rgba(21,101,192,0.95)"
  },

  2:{
    bg:"#C62828",
    glow:"rgba(198,40,40,0.95)"
  },

  3:{
    bg:"#2E7D32",
    glow:"rgba(46,125,50,0.95)"
  },

  4:{
    bg:"#6A1B9A",
    glow:"rgba(106,27,154,0.95)"
  },

  5:{
    bg:"#EF6C00",
    glow:"rgba(239,108,0,0.95)"
  },

  6:{
    bg:"#00838F",
    glow:"rgba(0,131,143,0.95)"
  },

  7:{
    bg:"#AD1457",
    glow:"rgba(173,20,87,0.95)"
  },

  8:{
    bg:"#5D4037",
    glow:"rgba(93,64,55,0.95)"
  },

  9:{
    bg:"#283593",
    glow:"rgba(40,53,147,0.95)"
  },

  10:{
    bg:"#9E9D24",
    glow:"rgba(158,157,36,0.95)"
  }

};

/* LOAD LAST 10 BIDS */

const container =
document.getElementById("lineContainer");

db.ref("last10bids").on("value", snap=>{

  container.innerHTML = "";

  const arr =
  snap.val() || [];

  arr.forEach((item,index)=>{

    const teamNum =
    Number(item.teamNum || 1);

    const colors =
    teamColors[teamNum] ||
    teamColors[1];

    const opacity =
    Math.max(0.18, 1 - index * 0.1);

    const row =
    document.createElement("div");

    row.className =
    "bidRow";

    row.style.background =
    colors.bg;

    row.style.boxShadow =
    `
    0 0 12px ${colors.glow},
    0 0 22px ${colors.glow},
    0 0 36px ${colors.glow}
    `;

    row.style.opacity =
    opacity;

    row.innerHTML = `
      <span>${item.team}</span>
      <span class="amount">
        ${item.amount} Cr
      </span>
    `;

    container.appendChild(row);

  });

});

</script>

</body>
</html>
